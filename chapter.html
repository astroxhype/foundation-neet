<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chapter Explorer — NEET Bio Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f2eadb;
    --paper-2: #e5dac3;
    --ink: #11100d;
    --muted: #776e5e;
    --line: #1d1a15;
    --line-soft: #c9bea7;
    --red: #e53119;
    --red-dark: #9d1b0d;
    --olive: #6c7c33;
    --blue: #243d8f;
    --gold: #c08b1c;
    --shadow: 8px 8px 0 var(--ink);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    color: var(--ink);
    background:
      linear-gradient(90deg, rgba(17,16,13,0.055) 1px, transparent 1px) 0 0 / 34px 34px,
      linear-gradient(rgba(17,16,13,0.055) 1px, transparent 1px) 0 0 / 34px 34px,
      var(--paper);
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(17,16,13,0.16) 0.7px, transparent 0.7px);
    background-size: 5px 5px;
    opacity: 0.22;
    z-index: 50;
  }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; }

  /* ── CHAPTER LOADER: JAPANESE BRUTAL ── */
  .ch-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background:
      radial-gradient(circle at 50% 48%, rgba(229,49,25,0.22), transparent 34%),
      linear-gradient(90deg, rgba(242,234,219,0.04) 1px, transparent 1px) 0 0 / 36px 36px,
      linear-gradient(rgba(242,234,219,0.04) 1px, transparent 1px) 0 0 / 36px 36px,
      var(--ink);
    overflow: hidden;
    isolation: isolate;
  }

  .ch-loader:empty::after {
    content: 'INITIALIZING CHAPTER';
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 2;
    color: var(--red);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    transform: translate(-50%, -50%);
  }

  /* Immediate visible grid */
  .ch-loader .ldr-grid {
    position: absolute;
    inset: 0;
    z-index: 1;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(242,234,219,0.08) 49px, rgba(242,234,219,0.08) 50px),
      repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(242,234,219,0.08) 49px, rgba(242,234,219,0.08) 50px);
    animation: fadeIn 200ms ease forwards;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Kanji giant watermark — immediately visible */
  .ch-loader .kanji-bg {
    position: absolute;
    font-size: clamp(20rem, 50vw, 44rem);
    line-height: 0.8;
    top: 50%;
    left: 50%;
    z-index: 2;
    color: rgba(229,49,25,0.12);
    transform: translate(-50%, -50%) scale(0.5);
    animation: kanjiBoom 500ms cubic-bezier(.16,1,.3,1) 50ms forwards;
  }

  @keyframes kanjiBoom {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* Vertical Japanese side text */
  .ch-loader .jp-col {
    position: absolute;
    writing-mode: vertical-rl;
    font-size: 0.72rem;
    letter-spacing: 0.4em;
    color: var(--red);
    font-weight: 700;
    opacity: 0;
    z-index: 6;
  }

  .ch-loader .jp-col-left {
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    animation: jpSlideIn 500ms cubic-bezier(.2,.8,.2,1) 100ms forwards;
  }

  .ch-loader .jp-col-right {
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    animation: jpSlideIn 500ms cubic-bezier(.2,.8,.2,1) 200ms forwards;
  }

  @keyframes jpSlideIn {
    from { opacity: 0; transform: translateY(-50%) translateX(20px); }
    to { opacity: 0.6; transform: translateY(-50%) translateX(0); }
  }

  /* Corner brackets — immediate snap */
  .ch-loader .ldr-bracket {
    position: absolute;
    width: 48px;
    height: 48px;
    border: 3px solid var(--red);
    opacity: 0;
    z-index: 7;
    animation: bracketSnap 300ms cubic-bezier(.2,.8,.2,1) forwards;
  }

  .ch-loader .ldr-bracket--tl { top: 18px; left: 18px; border-right: 0; border-bottom: 0; animation-delay: 0ms; }
  .ch-loader .ldr-bracket--tr { top: 18px; right: 18px; border-left: 0; border-bottom: 0; animation-delay: 50ms; }
  .ch-loader .ldr-bracket--bl { bottom: 18px; left: 18px; border-right: 0; border-top: 0; animation-delay: 100ms; }
  .ch-loader .ldr-bracket--br { bottom: 18px; right: 18px; border-left: 0; border-top: 0; animation-delay: 150ms; }

  @keyframes bracketSnap {
    0% { opacity: 0; transform: scale(2.5); }
    70% { opacity: 1; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Scan rails */
  .ch-loader .scan-rail {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--red);
    transform-origin: left;
    transform: scaleX(0);
    z-index: 5;
  }

  .ch-loader .scan-rail--top {
    top: 30%;
    animation: railDraw 600ms cubic-bezier(.77,0,.18,1) 150ms forwards;
  }

  .ch-loader .scan-rail--bot {
    top: 70%;
    animation: railDraw 600ms cubic-bezier(.77,0,.18,1) 250ms forwards;
  }

  @keyframes railDraw {
    0% { transform: scaleX(0); opacity: 0; }
    50% { transform: scaleX(1); opacity: 0.8; }
    100% { transform: scaleX(1); opacity: 0.3; }
  }

  /* Center content block */
  .ch-loader .ldr-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 86vw;
    max-width: 800px;
  }

  /* Chapter code */
  .ch-loader .ldr-code {
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 12px;
    opacity: 0;
    animation: codeFade 400ms ease 150ms forwards;
  }

  @keyframes codeFade {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Giant number — IMMEDIATE slam */
  .ch-loader .ldr-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(14rem, 32vw, 26rem);
    line-height: 0.7;
    position: relative;
    color: var(--paper);
    opacity: 0;
    animation: numSlam 400ms cubic-bezier(.1,.9,.2,1) 200ms forwards;
  }

  .ch-loader .ldr-num::after {
    content: attr(data-n);
    position: absolute;
    inset: 0;
    color: var(--red);
    clip-path: inset(100% 0 0 0);
    animation: numRedFill 600ms cubic-bezier(.77,0,.18,1) 550ms forwards;
  }

  @keyframes numSlam {
    0% { opacity: 0; transform: scale(4) rotate(-10deg); }
    50% { opacity: 1; transform: scale(0.9) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  @keyframes numRedFill {
    from { clip-path: inset(100% 0 0 0); }
    to { clip-path: inset(0 0 0 0); }
  }

  /* Title — wipe reveal */
  .ch-loader .ldr-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 5vw, 4.5rem);
    line-height: 0.88;
    color: var(--paper);
    margin-top: 10px;
    clip-path: inset(0 100% 0 0);
    animation: titleWipe 600ms cubic-bezier(.77,0,.18,1) 650ms forwards;
  }

  @keyframes titleWipe {
    to { clip-path: inset(0 0 0 0); }
  }

  /* Floor tag */
  .ch-loader .ldr-floor {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 12px;
    opacity: 0;
    animation: codeFade 300ms ease 850ms forwards;
  }

  /* Hanko seal slam */
  .ch-loader .hanko {
    position: absolute;
    top: 50%;
    right: clamp(50px, 10vw, 140px);
    width: clamp(72px, 10vw, 108px);
    height: clamp(72px, 10vw, 108px);
    border: 4px solid var(--red);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(2.2rem, 4.5vw, 3.6rem);
    color: var(--red);
    font-weight: 700;
    z-index: 11;
    opacity: 0;
    transform: translateY(-50%) rotate(-12deg) scale(4);
    animation: hankoHit 300ms cubic-bezier(.1,.9,.2,1) 900ms forwards;
  }

  .ch-loader .hanko::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 2px solid var(--red);
    border-radius: 2px;
    opacity: 0.4;
  }

  @keyframes hankoHit {
    0% { opacity: 0; transform: translateY(-50%) rotate(-12deg) scale(4); }
    60% { opacity: 1; transform: translateY(-50%) rotate(-12deg) scale(0.88); }
    100% { opacity: 1; transform: translateY(-50%) rotate(-12deg) scale(1); }
  }

  /* Bottom progress bar */
  .ch-loader .ldr-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(229,49,25,0.15);
    z-index: 10;
  }

  .ch-loader .ldr-progress-fill {
    height: 100%;
    background: var(--red);
    transform-origin: left;
    transform: scaleX(0);
    animation: barFill 2000ms cubic-bezier(.4,0,.2,1) 100ms forwards;
  }

  @keyframes barFill { to { transform: scaleX(1); } }

  /* Slash line */
  .ch-loader .slash-accent {
    position: absolute;
    top: -10%;
    left: 58%;
    width: 3px;
    height: 120%;
    background: var(--red);
    z-index: 4;
    transform: rotate(18deg) scaleY(0);
    transform-origin: top;
    animation: slashDraw 400ms cubic-bezier(.77,0,.18,1) 400ms forwards;
  }

  @keyframes slashDraw {
    to { transform: rotate(18deg) scaleY(1); opacity: 0.2; }
  }

  /* Dot burst */
  .ch-loader .dot-burst {
    position: absolute;
    width: 6px;
    height: 6px;
    background: var(--red);
    opacity: 0;
    z-index: 9;
  }

  .ch-loader .dot-burst.go {
    animation: dotExplode 1000ms cubic-bezier(.2,.8,.2,1) forwards;
  }

  @keyframes dotExplode {
    0% { opacity: 1; transform: translate(0) scale(1.5); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* ── EXIT SEQUENCE ── */
  .ch-loader.exit .ldr-center {
    animation: exitCenter 450ms cubic-bezier(.77,0,.18,1) forwards;
  }

  .ch-loader.exit .hanko {
    animation: exitHanko 350ms cubic-bezier(.77,0,.18,1) forwards;
  }

  .ch-loader.exit .kanji-bg {
    animation: exitKanji 400ms cubic-bezier(.77,0,.18,1) forwards;
  }

  @keyframes exitCenter {
    to { opacity: 0; transform: translate(-50%, -50%) scale(0.7) translateY(30px); }
  }

  @keyframes exitHanko {
    to { opacity: 0; transform: translateY(-50%) rotate(-12deg) scale(2.5); }
  }

  @keyframes exitKanji {
    to { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
  }

  /* Aperture blades exit */
  .ch-loader .aperture {
    position: absolute;
    inset: 0;
    z-index: 120;
    opacity: 0;
    pointer-events: none;
    transition: opacity 90ms linear;
  }

  .ch-loader .aperture .blade {
    position: absolute;
    background: var(--ink);
    transition: transform 650ms cubic-bezier(.77,0,.18,1);
  }

  .ch-loader .aperture .blade--top { top: 0; left: 0; right: 0; height: 51%; }
  .ch-loader .aperture .blade--bot { bottom: 0; left: 0; right: 0; height: 51%; }
  .ch-loader .aperture .blade--left { top: 0; left: 0; bottom: 0; width: 51%; }
  .ch-loader .aperture .blade--right { top: 0; right: 0; bottom: 0; width: 51%; }

  .ch-loader.exit .aperture { opacity: 1; }
  .ch-loader.exit .aperture .blade--top { transform: translateY(-100%); }
  .ch-loader.exit .aperture .blade--bot { transform: translateY(100%); }
  .ch-loader.exit .aperture .blade--left { transform: translateX(-100%); }
  .ch-loader.exit .aperture .blade--right { transform: translateX(100%); }

  /* White flash */
  .ch-loader .exit-flash {
    position: absolute;
    inset: 0;
    background: var(--paper);
    opacity: 0;
    z-index: 200;
    pointer-events: none;
  }

  .ch-loader.exit .exit-flash {
    animation: whiteFlash 400ms ease 100ms forwards;
  }

  @keyframes whiteFlash {
    0% { opacity: 0; }
    35% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  /* Die */
  .ch-loader.die {
    display: none;
  }

  /* ── SHELL ── */
  .shell {
    width: min(1500px, calc(100vw - 28px));
    margin: 14px auto 64px;
    border: 2px solid var(--ink);
    background: var(--paper);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    isolation: isolate;
    opacity: 0;
    transform-origin: 50% 0;
    animation: chapterGateOpen 1850ms cubic-bezier(.16,1,.3,1) 2580ms forwards;
  }

  .shell::before,
  .shell::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 80;
    pointer-events: none;
    opacity: 0;
  }

  .shell::before {
    background:
      linear-gradient(90deg, transparent 0 6%, var(--red) 6% 6.32%, transparent 6.32% 100%),
      linear-gradient(0deg, rgba(242,234,219,0.88), rgba(229,49,25,0.10)),
      var(--paper);
    transform-origin: left;
    animation: chapterScanner 1540ms cubic-bezier(.77,0,.18,1) 2760ms both;
  }

  .shell::after {
    background:
      linear-gradient(112deg, transparent 0 42%, rgba(229,49,25,0.92) 42.1% 43.2%, transparent 43.3% 100%),
      linear-gradient(90deg, rgba(17,16,13,0.82), rgba(17,16,13,0));
    mix-blend-mode: multiply;
    animation: chapterSlashFlash 1160ms cubic-bezier(.2,.8,.2,1) 3200ms both;
  }

  @keyframes chapterGateOpen {
    0% {
      opacity: 0;
      transform: translateY(48px) scale(0.94) rotate(-0.55deg);
      clip-path: polygon(50% 0, 50% 0, 50% 100%, 50% 100%);
      filter: contrast(1.35);
    }
    30% {
      opacity: 1;
      transform: translateY(20px) scale(0.985) rotate(0.18deg);
      clip-path: polygon(6% 0, 94% 0, 88% 100%, 12% 100%);
      filter: contrast(1.16);
    }
    64% {
      opacity: 1;
      transform: translateY(-7px) scale(1.01) rotate(-0.08deg);
      clip-path: polygon(0 0, 100% 0, 97% 100%, 3% 100%);
      filter: contrast(1.04);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1) rotate(0);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      filter: none;
    }
  }

  @keyframes chapterScanner {
    0% { opacity: 1; transform: translateX(-110%) skewX(-18deg); }
    42% { opacity: 0.92; transform: translateX(0) skewX(-18deg); }
    100% { opacity: 0; transform: translateX(118%) skewX(-18deg); }
  }

  @keyframes chapterSlashFlash {
    0% { opacity: 0; transform: translateX(-120%) skewX(-23deg); }
    38% { opacity: 0.76; transform: translateX(-4%) skewX(-23deg); }
    100% { opacity: 0; transform: translateX(120%) skewX(-23deg); }
  }

  /* ── NAV BAR ── */
  .chapter-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    min-height: 54px;
    animation: navSlide 720ms cubic-bezier(.16,1,.3,1) 3220ms both;
  }

  @keyframes navSlide {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 24px;
    border: none;
    background: transparent;
    color: var(--paper);
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
    transition: background 180ms;
  }

  .back-btn:hover { background: var(--red); }
  .back-btn::before { content: '\2190'; font-size: 1.2rem; }

  .nav-code {
    padding: 16px 24px;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--paper-2);
  }

  /* ── HERO ── */
  .chapter-hero {
    display: grid;
    grid-template-columns: 1fr 320px;
    border-bottom: 2px solid var(--ink);
    animation: heroOpenPlate 1280ms cubic-bezier(.16,1,.3,1) 3040ms both;
  }

  .hero-main {
    padding: clamp(32px, 6vw, 72px);
    border-right: 2px solid var(--ink);
    position: relative;
    overflow: hidden;
  }

  .hero-main::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 5;
    background:
      linear-gradient(90deg, transparent 0 13%, var(--red) 13% 13.5%, transparent 13.5% 100%),
      rgba(17,16,13,0.92);
    transform: translateX(-110%) skewX(-17deg);
    transform-origin: left;
    pointer-events: none;
    animation: heroInkWipe 1360ms cubic-bezier(.77,0,.18,1) 3060ms both;
  }

  @keyframes heroOpenPlate {
    0% { opacity: 0; transform: translateY(42px) scale(0.98); clip-path: inset(0 0 100% 0); }
    54% { opacity: 1; transform: translateY(-5px) scale(1.006); clip-path: inset(0 0 0 0); }
    100% { opacity: 1; transform: translateY(0) scale(1); clip-path: inset(0 0 0 0); }
  }

  @keyframes heroInkWipe {
    0% { opacity: 1; transform: translateX(-110%) skewX(-17deg); }
    45% { opacity: 1; transform: translateX(0) skewX(-17deg); }
    100% { opacity: 0; transform: translateX(118%) skewX(-17deg); }
  }

  .hero-code {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding: 8px 14px;
    border: 2px solid var(--red);
    color: var(--red-dark);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    animation: fadeUp 640ms cubic-bezier(.2,.8,.2,1) 3280ms both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chapter-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4.8rem, 11vw, 12rem);
    font-weight: 400;
    line-height: 0.82;
    letter-spacing: -0.03em;
    animation: titleReveal 1160ms cubic-bezier(.16,1,.3,1) 3440ms both;
  }

  @keyframes titleReveal {
    from {
      opacity: 0;
      transform: translateY(70px);
      clip-path: inset(100% 0 0 0);
    }
    to {
      opacity: 1;
      transform: translateY(0);
      clip-path: inset(0 0 0 0);
    }
  }

  .chapter-desc {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 2px solid var(--ink);
    font-size: clamp(0.92rem, 1.3vw, 1.15rem);
    line-height: 1.7;
    color: #2f2a21;
    animation: fadeUp 680ms ease 3760ms both;
  }

  .chapter-warning {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 14px;
    border: 2px solid var(--red);
    background: var(--red);
    color: var(--paper);
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    animation: warningStamp 660ms cubic-bezier(.16,1,.3,1) 3940ms both;
  }

  @keyframes warningStamp {
    0% { opacity: 0; transform: translateY(22px) scale(1.35) rotate(-2deg); }
    64% { opacity: 1; transform: translateY(0) scale(0.94) rotate(0.6deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
  }

  /* ── HERO SIDE ── */
  .hero-side {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    background: var(--paper-2);
    animation: sideLedgerOpen 940ms cubic-bezier(.16,1,.3,1) 3260ms both;
  }

  @keyframes sideLedgerOpen {
    from { opacity: 0; transform: translateX(46px); clip-path: inset(0 0 0 100%); }
    to { opacity: 1; transform: translateX(0); clip-path: inset(0 0 0 0); }
  }

  .meta-cell {
    padding: 18px 22px;
    border-bottom: 1px solid var(--ink);
    animation: metaSlide 500ms cubic-bezier(.2,.8,.2,1) both;
  }

  .meta-cell:last-child { border-bottom: 0; }

  @keyframes metaSlide {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .meta-cell b {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 0.88;
    color: var(--red);
    font-weight: 400;
  }

  .meta-cell span {
    font-size: 0.64rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
  }

  /* ── DEPS SECTION ── */
  .deps-section {
    border-bottom: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    padding: clamp(24px, 4vw, 44px);
  }

  .deps-title {

    return {

          <div class="dep-row" style="animation-delay:4280ms">
            <strong>Unlocks</strong>
            <div class="dep-chips">${chapter.after.map((a, i) => `<span class="dep-chip" style="animation-delay:${4380 + i * 70}ms">${a}</span>`).join('')}</div>
          </div>
          <div class="dep-row" style="animation-delay:4360ms">
            <strong>Exam Role</strong>
            <div class="dep-chips">${chapter.role.map((r, i) => `<span class="dep-chip" style="animation-delay:${4460 + i * 70}ms">${r}</span>`).join('')}</div>
          </div>
        </div>
      </section>

      <div class="focus-strip">
        ${chapter.ncert.map((f, i) => `<div class="focus-cell" style="animation-delay:${4620 + i * 100}ms">${f}</div>`).join('')}
      </div>

      <section class="topics-section">
        <div class="topics-header">
          <h2>Inside <span class="serif">this</span> chapter</h2>
          <div class="topics-counter"><b>${totalSubs}</b> subtopics across ${topics.length} topics</div>
        </div>
        <div class="topics-grid">
          ${topics.map((topic, ti) => `
            <article class="topic-card" data-index="${ti}" style="--card-delay:${ti * 100}ms">
              <div class="topic-head">
                <b>${String(ti + 1).padStart(2, '0')}</b>
                <span>${topic.title}</span>
              </div>
              <ul class="topic-subs">
                ${topic.subs.map((sub, si) => `<li style="animation-delay:${(ti * 120) + (si * 55) + 180}ms">${sub}</li>`).join('')}
              </ul>
            </article>
          `).join('')}
        </div>
      </section>

      <section class="recall-section">
        <h3>Recall checks</h3>
        <div class="recall-grid">
          ${chapter.recall.map((r, i) => `<div class="recall-item" data-index="${i}" style="--item-delay:${i * 120}ms">${r}</div>`).join('')}
        </div>
      </section>

      <nav class="chapter-pager">
        ${prev ? `<button class="pager-link" onclick="goTo('${prev.id}')"><small>${prev.code} &mdash; Previous</small><strong>${prev.title}</strong></button>` : `<button class="pager-link" disabled><small>No previous</small><strong>&mdash;</strong></button>`}
        ${next ? `<button class="pager-link" onclick="goTo('${next.id}')"><small>${next.code} &mdash; Next</small><strong>${next.title}</strong></button>` : `<button class="pager-link" disabled><small>No next</small><strong>&mdash;</strong></button>`}
      </nav>

      <footer class="chapter-footer">
        <strong>${chapter.title}</strong>
        <button class="footer-back" onclick="goBack()">Back to Map</button>
      </footer>
    `;

    // scroll-triggered animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.topic-card, .recall-item').forEach(el => observer.observe(el));
  }

  renderChapter(chapterId);
</script>
</body>
</html>
